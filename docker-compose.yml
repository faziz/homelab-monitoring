# This will monitoring and alert tooling.
---
services:
  traefik:
    image: traefik:v3.6.14
    container_name: traefik
    restart: unless-stopped
    environment:
      - CF_API_EMAIL=${CLOUDFLARE_EMAIL}          # optional but recommended
      - CF_DNS_API_TOKEN=${CF_TOKEN}
      - CF_ZONE_API_TOKEN=${CF_TOKEN}             # same token
      - TRAEFIK_HOST=${TRAEFIK_HOST}
    command:
      - --log.level=DEBUG
      - --global.sendAnonymousUsage=false
      - --entrypoints.web.address=:8080
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --entrypoints.websecure.address=:8443
      # Use Let's Encrypt production server (or staging for testing)
      # https://acme-staging-v02.api.letsencrypt.org/directory
      - --certificatesresolvers.letsencrypt.acme.caserver=https://acme-v02.api.letsencrypt.org/directory
      - --certificatesresolvers.letsencrypt.acme.email=${ADMIN_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      # DNS-01 challenge with Cloudflare
      - --certificatesresolvers.letsencrypt.acme.dnsChallenge.provider=cloudflare
      # Disable HTTP and TLS challenges
      - --certificatesresolvers.letsencrypt.acme.dnsChallenge.delayBeforeCheck=30
      # Use environment variables for Cloudflare credentials
      - --certificatesresolvers.letsencrypt.acme.dnsChallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      # Docker provider
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/dynamic.yml
      # Dashboard
      - --api.dashboard=true
      - --api.insecure=false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certResolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/acme                        # persistent ACME storage
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      - ${HTTP_PORTS}
      - ${HTTPS_PORTS}
    networks:
      - traefik-net

  external-routes:
    image: alpine:latest
    container_name: external-routes
    restart: unless-stopped
    command: ["sh", "-c", "sleep infinity"]
    environment:
      - SYNOLOGY_HOST=${SYNOLOGY_HOST}
      - SYNOLOGY_TARGET_URL=${SYNOLOGY_TARGET_URL}
      - PORTAINER_HOST=${PORTAINER_HOST}
      - PORTAINER_TARGET_URL=${PORTAINER_TARGET_URL}
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      # Synology DSM (HTTPS)
      - "traefik.http.routers.storage.rule=Host(`${SYNOLOGY_HOST}`)"
      - "traefik.http.routers.storage.entrypoints=websecure"
      - "traefik.http.routers.storage.tls.certResolver=letsencrypt"
      - "traefik.http.routers.storage.service=storage@docker"
      - "traefik.http.services.storage.loadbalancer.server.url=${SYNOLOGY_TARGET_URL}"
      # Portainer (HTTP)
      - "traefik.http.routers.portainer.rule=Host(`${PORTAINER_HOST}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certResolver=letsencrypt"
      - "traefik.http.routers.portainer.service=portainer@docker"
      - "traefik.http.services.portainer.loadbalancer.server.url=${PORTAINER_TARGET_URL}"

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    restart: unless-stopped
    networks:
      - traefik-net
    volumes:
      - uptime_kuma_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - UPTIME_KUMA_DISABLE_FRAME_SAMEORIGIN=1
      - UPTIMEKUMA_HOST=${UPTIMEKUMA_HOST}
      - HOST=0.0.0.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`${UPTIMEKUMA_HOST}`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls.certResolver=letsencrypt"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

  gotify:
    image: gotify/server:latest
    container_name: gotify
    restart: unless-stopped
    environment:
      - GOTIFY_HOST=${GOTIFY_HOST}
      - GOTIFY_DEFAULTUSER_NAME=${GOTIFY_USERNAME}
      - GOTIFY_DEFAULTUSER_PASS=${GOTIFY_PASSWORD}
      - GOTIFY_SERVER_PORT=80
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gotify.rule=Host(`${GOTIFY_HOST}`)"
      - "traefik.http.routers.gotify.entrypoints=websecure"
      - "traefik.http.routers.gotify.tls.certResolver=letsencrypt"
      - "traefik.http.services.gotify.loadbalancer.server.port=80"
    networks:
      - traefik-net
    volumes:
    - gotify_data:/app/data

networks:
  traefik-net:
    name: traefik-net

volumes:
  acme:
  uptime_kuma_data:
  gotify_data: